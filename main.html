<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvisoPollutant Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#000000);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
    color:white;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    padding:50px 20px;
}

h1{
    font-size:42px;
    font-weight:700;
    background:linear-gradient(90deg,#00f2fe,#4facfe);
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    margin-top:10px;
    opacity:0.8;
    font-size:18px;
}

.buttons{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.btn{
    padding:15px 40px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    transition:0.4s;
    font-weight:600;
}

.dashboard-btn{
    background:#00c6ff;
    box-shadow:0 0 20px #00c6ff;
}

.symptom-btn{
    background:#8e2de2;
    box-shadow:0 0 20px #8e2de2;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px white;
}

.section{
    margin-top:60px;
    display:none;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:40px;
    margin-top:40px;
}

.card{
    background:rgba(255,255,255,0.08);
    border-radius:30px;
    padding:40px 20px;
    backdrop-filter:blur(12px);
    transition:0.4s;
    box-shadow:0 0 25px rgba(0,255,255,0.15);
}

.card:hover{
    transform:translateY(-8px);
}

.card h2{
    font-size:24px;
    margin-bottom:15px;
}

.value{
    font-size:32px;
    font-weight:700;
    margin-bottom:10px;
}

.status{
    font-size:18px;
    font-weight:600;
}

.safe{
    color:#00ff99;
}

.danger{
    color:#ff4d4d;
}

/* SYMPTOMS */
.checkbox-group{
    margin-top:30px;
    text-align:left;
    max-width:400px;
    margin-left:auto;
    margin-right:auto;
}

.checkbox-group label{
    display:block;
    margin:12px 0;
}

.suggestion-box{
    margin-top:25px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    display:none;
}

#chatbot{
    border-left:4px solid #00f2fe;
    text-align:left;
}

.bot-title{
    font-weight:600;
    color:#00f2fe;
    margin-bottom:10px;
}

.footer{
    margin-top:60px;
    font-size:14px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>InvisoPollutant Tracker</h1>
<p class="subtitle">Smart Indoor Health & Emergency Monitoring System</p>

<div class="buttons">
<button class="btn dashboard-btn" onclick="openDashboard()">Live Dashboard</button>
<button class="btn symptom-btn" onclick="showSymptoms()">Check Symptoms</button>
</div>

<!-- DASHBOARD -->

<div id="liveDashboard" class="section">
<h2>Live Environment Data</h2>

<div class="dashboard">
<div class="card">
<h2>Gas Level</h2>
<div id="temp" class="value">--</div>
<div id="temp-status" class="status"></div>
</div>

<div class="card">
<h2> VOC </h2>
<div id="co2" class="value">--</div>
<div id="co2-status" class="status"></div>
</div>

<div class="card">
<h2>Temparature</h2>
<div id="o2" class="value">--</div>
<div id="o2-status" class="status"></div>
</div>

<div class="card">
<h2>Humidity</h2>
<div id="voc" class="value">--</div>
<div id="voc-status" class="status"></div>
</div>
</div>
</div>

<!-- SYMPTOMS -->
<div id="symptoms" class="section">
<h2>Select Your Symptoms</h2>

<div class="checkbox-group">
<label><input type="checkbox" value="Headache"> Headache</label>
<label><input type="checkbox" value="Dizziness"> Dizziness</label>
<label><input type="checkbox" value="Eye Irritation"> Eye Irritation</label>
<label><input type="checkbox" value="Nausea"> Nausea</label>
<label><input type="checkbox" value="Breathing Difficulty"> Breathing Difficulty</label>
</div>

<br>
<button class="btn dashboard-btn" onclick="generateSuggestion()">Analyze</button>

<div id="suggestion" class="suggestion-box"></div>
<div id="chatbot" class="suggestion-box"></div>
</div>

<div class="footer">
© 2026 Team Livosa | IoT Hackathon Project
</div>

</div>

<script>

const TOKEN="zMZmMD4JbiTpHYMgp00PoKgEocM3rLiq";

const V_TEMP="v0";
const V_CO2="v1";
const V_O2="v2";
const V_VOC="v3";

function openDashboard(){
document.getElementById("symptoms").style.display="none";
document.getElementById("liveDashboard").style.display="block";
}

function showSymptoms(){
document.getElementById("liveDashboard").style.display="none";
document.getElementById("symptoms").style.display="block";
}

async function getData(pin){

const response = await fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&${pin}`);

let data = await response.text();

data = data.replace("[","").replace("]","").trim();

return Number(data);

}

async function updateDashboard(){

let temp=parseFloat(await getData(V_TEMP));
let co2=parseFloat(await getData(V_CO2));
let o2=parseFloat(await getData(V_O2));
let voc=parseFloat(await getData(V_VOC));

// updateCard("temp","temp-status",temp+" ppm",temp<800);
// updateCard("co2","co2-status",co2+" ppm",co2<500);
// updateCard("o2","o2-status",o2+"9.78°C",o2>10 && o2<35);
// updateCard("voc","voc-status",voc+"5%",voc>=30 && voc<=60);
updateCard("temp","temp-status",temp+" ppm",temp<800);
updateCard("co2","co2-status",co2+" ppm",co2>0);
updateCard("o2","o2-status",o2+"9.78°C",o2>0 );
updateCard("voc","voc-status",voc+"5%",voc>=0);
}

function updateCard(valueId,statusId,value,isSafe){

document.getElementById(valueId).innerHTML=value;
const status=document.getElementById(statusId);

if(isSafe){
status.innerHTML="Safe";
status.className="status safe";
}else{
status.innerHTML="Un-Safe";
status.className="status danger";
}
}

setInterval(updateDashboard,2000);
updateDashboard();

async function generateSuggestion(){

let suggestion=document.getElementById("suggestion");
let chatbot=document.getElementById("chatbot");

suggestion.style.display="block";
suggestion.innerHTML="🔍 Collecting sensor data and symptoms...";

let temp=parseFloat(await getData(V_TEMP));
let co2=parseFloat(await getData(V_CO2));
let o2=parseFloat(await getData(V_O2));
let voc=parseFloat(await getData(V_VOC));

/* Collect selected symptoms */

let selectedSymptoms=[];
document.querySelectorAll(".checkbox-group input:checked")
.forEach(cb=>{
selectedSymptoms.push(cb.value);
});

if(selectedSymptoms.length===0){
suggestion.innerHTML="⚠ Please select at least one symptom.";
return;
}

/* Send data to backend AI */

const res=await fetch("http://localhost:5000/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

symptoms:selectedSymptoms,
sensorData:{temp,co2,o2,voc}

})

});

const data=await res.json();

chatbot.style.display="block";

chatbot.innerHTML=`
<div class="bot-title">🤖 AI Health Assistant</div>
${data.reply}
`;

}

</script>

</body>
</html>
